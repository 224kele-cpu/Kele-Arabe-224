<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Arabe - Bibliothèque Automatique</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: var(--primary); color: white; padding: 10px; text-align: center; font-size: 1.2rem; font-weight: bold; }

        /* Menu de sélection des cours */
        .menu-container { padding: 10px; background: white; border-bottom: 2px solid var(--accent); }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }

        /* Zone d'affichage divisée */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* PDF (Moitié haute) */
        .pdf-section { flex: 1; overflow-y: auto; background: #525659; position: relative; border-bottom: 3px solid var(--primary); }
        #pdf-canvas { width: 100%; height: auto; display: block; margin: 0 auto; }
        
        .pdf-nav { position: absolute; bottom: 10px; left: 0; right: 0; display: flex; justify-content: space-around; pointer-events: none; }
        .nav-btn { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; pointer-events: auto; opacity: 0.9; }

        /* Traducteur (Moitié basse) */
        .translator-section { height: 40%; background: white; border-top: 1px solid #ccc; }
        iframe { width: 100%; height: 100%; border: none; }

        .hidden { display: none; }
    </style>
</head>
<body>

<header>KELE-ARABE : LECTEUR IA</header>

<!-- 1. SÉLECTION DU COURS -->
<div class="menu-container">
    <select id="pdf-selector" onchange="loadNewPDF(this.value)">
        <option value="">-- Choisir un cours --</option>
        <!-- Liste tes PDF ici une seule fois -->
        <option value="Tome1/Lecture.pdf">Leçon 1 : Lecture</option>
        <option value="Tome1/Grammaire.pdf">Leçon 2 : Grammaire</option>
        <option value="Tome1/Vocabulaire.pdf">Leçon 3 : Vocabulaire</option>
        <!-- Tu peux en ajouter 100 ici très vite -->
    </select>
</div>

<div class="main-content">
    <!-- 2. ZONE PDF -->
    <div class="pdf-section" id="pdf-area">
        <canvas id="pdf-canvas"></canvas>
        <div class="pdf-nav">
            <button class="nav-btn" onclick="prevPage()">Précédent</button>
            <button class="nav-btn" onclick="nextPage()">Suivant</button>
        </div>
    </div>

    <!-- 3. ZONE TRADUCTEUR Hugging Face -->
    <div class="translator-section">
        <iframe src="https://soumah224-mon-traducteur.hf.space"></iframe>
    </div>
</div>

<script>
    let pdfDoc = null, pageNum = 1, scale = 1.3, canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    // Fonction pour charger un PDF
    function loadNewPDF(pdfUrl) {
        if(!pdfUrl) return;
        pageNum = 1;
        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            pdfDoc = pdf;
            renderPage(pageNum);
        }).catch(err => alert("Fichier introuvable. Vérifiez le nom dans GitHub."));
    }

    function renderPage(num) {
        pdfDoc.getPage(num).then(page => {
            let viewport = page.getViewport({scale: scale});
            let outputScale = window.innerWidth / viewport.width;
            let finalViewport = page.getViewport({scale: outputScale});

            canvas.height = finalViewport.height;
            canvas.width = finalViewport.width;
            page.render({canvasContext: ctx, viewport: finalViewport});
        });
    }

    function prevPage() { if(pageNum <= 1) return; pageNum--; renderPage(pageNum); }
    function nextPage() { if(pageNum >= pdfDoc.numPages) return; pageNum++; renderPage(pageNum); }

    // Chargement auto du premier si besoin
    // loadNewPDF('Tome1/Lecture.pdf');
</script>

</body>
</html>
