<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Arabe - Cours & Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); color: var(--primary); padding-bottom: 50px; }
        
        header { background: var(--primary); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
        
        .container { width: 95%; max-width: 800px; margin: 20px auto; }

        /* Section PDF */
        .pdf-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .pdf-header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; font-weight: bold; color: var(--accent); }
        .pdf-container { width: 100%; height: 450px; background: #eee; }
        iframe { width: 100%; height: 100%; border: none; }

        /* Section Notes (Ton code intégré) */
        .notes-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; }
        textarea { width: 100%; height: 80px; border-radius: 8px; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        
        .note { background: #fff9c4; padding: 10px; margin-top: 10px; border-radius: 5px; border-left: 5px solid #fbc02d; font-size: 0.9rem; }
        .delete-btn { color: red; float: right; font-weight: bold; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

<header>
    <strong>KELE-ARABE</strong>
</header>

<div class="container">
    <!-- BLOC PDF -->
    <div class="pdf-card">
        <div class="pdf-header">📖 Tome 1 : Lecture</div>
        <div class="pdf-container">
            <iframe src="Tome1/Lecture.pdf">
                <p>Votre mobile ne peut pas afficher le PDF. <a href="Tome1/Lecture.pdf">Ouvrir le PDF ici</a></p>
            </iframe>
        </div>
    </div>

    <!-- BLOC NOTES (Ton code) -->
    <div class="notes-card">
        <h3>📝 Mes Notes de Cours</h3>
        <textarea id="noteInput" placeholder="Écris une règle importante ici..."></textarea>
        <button onclick="addNote()">Enregistrer ma note</button>
        <div id="notesList"></div>
    </div>
</div>

<script>
    // TON SCRIPT DE GESTION DES NOTES
    function loadNotes() {
        const notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
        const list = document.getElementById('notesList');
        list.innerHTML = '';
        notes.forEach((note, index) => {
            const div = document.createElement('div');
            div.className = 'note';
            div.innerHTML = `<span class="delete-btn" onclick="deleteNote(${index})">X</span> ${note}`;
            list.appendChild(div);
        });
    }

    function addNote() {
        const input = document.getElementById('noteInput');
        if (!input.value) return;
        const notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
        notes.push(input.value);
        localStorage.setItem('myNotes', JSON.stringify(notes));
        input.value = '';
        loadNotes();
    }

    function deleteNote(index) {
        const notes = JSON.parse(localStorage.getItem('myNotes') || '[]');
        notes.splice(index, 1);
        localStorage.setItem('myNotes', JSON.stringify(notes));
        loadNotes();
    }

    loadNotes();
</script>

</body>
</html>
