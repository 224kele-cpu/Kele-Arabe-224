<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kele-Arabe - Leçon Interactive</title>
    <!-- On utilise PDF.js pour la lecture page par page -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --success: #27ae60; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; }
        
        header { background: var(--primary); color: white; width: 100%; padding: 15px; text-align: center; font-weight: bold; }

        .app-container { width: 95%; max-width: 800px; margin: 15px auto; }

        /* Style de la Liseuse PDF */
        .pdf-viewer { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 10px; text-align: center; }
        #pdf-canvas { width: 100%; height: auto; border: 1px solid #ddd; border-radius: 5px; }
        .controls { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #ccc; }
        .btn-quiz { background: var(--accent); width: 100%; margin-top: 10px; }

        /* Style du Quiz */
        .quiz-section { background: white; margin-top: 20px; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .question { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee; }
        .options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .option-btn { border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: none; text-align: left; cursor: pointer; }
        .correct { background: #d4edda !important; border-color: #c3e6cb !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: #f5c6cb !important; color: #721c24; }
    </style>
</head>
<body>

<header>KELE-ARABE - TOME 1</header>

<div class="app-container">
    
    <!-- SECTION LECTURE PDF -->
    <div class="pdf-viewer">
        <canvas id="pdf-canvas"></canvas>
        <div class="controls">
            <button class="btn" id="prev-page">⬅ Précédent</button>
            <span>Page <span id="page-num">1</span> / <span id="page-count">?</span></span>
            <button class="btn" id="next-page">Suivant ➡</button>
        </div>
    </div>

    <!-- SECTION QUESTIONS -->
    <div class="quiz-section">
        <h3>🎯 Vérifie tes connaissances</h3>
        
        <div class="question">
            <p><strong>1. Quel est le sujet principal de la page actuelle ?</strong></p>
            <div class="options">
                <button class="option-btn" onclick="checkAnswer(this, false)">L'alphabet uniquement</button>
                <button class="option-btn" onclick="checkAnswer(this, true)">La lecture des mots</button>
                <button class="option-btn" onclick="checkAnswer(this, false)">La grammaire complexe</button>
            </div>
        </div>

        <div id="feedback" style="text-align: center; font-weight: bold; margin-top: 10px;"></div>
    </div>

</div>

<script>
    // CONFIGURATION DU PDF
    const url = 'Tome1/Lecture.pdf'; // Chemin vers ton PDF
    let pdfDoc = null,
        pageNum = 1,
        pageRendering = false,
        pageNumPending = null,
        scale = 1.5,
        canvas = document.getElementById('pdf-canvas'),
        ctx = canvas.getContext('2d');

    // Charger le PDF via PDF.js
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    pdfjsLib.getDocument(url).promise.then(function(pdfDoc_) {
        pdfDoc = pdfDoc_;
        document.getElementById('page-count').textContent = pdfDoc.numPages;
        renderPage(pageNum);
    }).catch(err => {
        alert("Erreur lors du chargement du PDF. Vérifiez que le dossier et le fichier sont bien nommés.");
    });

    function renderPage(num) {
        pageRendering = true;
        pdfDoc.getPage(num).then(function(page) {
            let viewport = page.getViewport({scale: scale});
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            let renderContext = {
                canvasContext: ctx,
                viewport: viewport
            };
            let renderTask = page.render(renderContext);

            renderTask.promise.then(function() {
                pageRendering = false;
                if (pageNumPending !== null) {
                    renderPage(pageNumPending);
                    pageNumPending = null;
                }
            });
        });
        document.getElementById('page-num').textContent = num;
    }

    function queueRenderPage(num) {
        if (pageRendering) { pageNumPending = num; } else { renderPage(num); }
    }

    document.getElementById('prev-page').addEventListener('click', () => {
        if (pageNum <= 1) return;
        pageNum--;
        queueRenderPage(pageNum);
    });

    document.getElementById('next-page').addEventListener('click', () => {
        if (pageNum >= pdfDoc.numPages) return;
        pageNum++;
        queueRenderPage(pageNum);
    });

    // LOGIQUE DU QUIZ
    function checkAnswer(btn, isCorrect) {
        // Désactiver les autres boutons de la même question
        let options = btn.parentElement.querySelectorAll('.option-btn');
        options.forEach(opt => opt.disabled = true);

        if (isCorrect) {
            btn.classList.add('correct');
            document.getElementById('feedback').innerHTML = "✅ Bravo ! C'est la bonne réponse.";
            document.getElementById('feedback').style.color = "green";
        } else {
            btn.classList.add('wrong');
            document.getElementById('feedback').innerHTML = "❌ Dommage, réessaie en relisant la page.";
            document.getElementById('feedback').style.color = "red";
        }
    }
</script>

</body>
</html>
